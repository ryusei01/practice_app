name: Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Copy docs/textbook into backend build context
        run: |
          mkdir -p backend/docs/textbook
          cp -r docs/textbook/* backend/docs/textbook/

      - name: Build and push Docker image
        run: |
          IMAGE="asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/quiz-marketplace/api:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/quiz-marketplace/api:${{ github.sha }}"
          gcloud run deploy quiz-marketplace-api \
            --image "$IMAGE" \
            --region asia-northeast1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "\
              ENABLE_ML=false,\
              DEBUG=false,\
              APP_NAME=QuizMarketplace,\
              SUPABASE_URL=${{ secrets.SUPABASE_URL }},\
              SUPABASE_KEY=${{ secrets.SUPABASE_KEY }},\
              SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }},\
              DATABASE_URL=${{ secrets.DATABASE_URL }},\
              SECRET_KEY=${{ secrets.SECRET_KEY }},\
              STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }},\
              STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }},\
              STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }},\
              STRIPE_PREMIUM_PRICE_ID=${{ secrets.STRIPE_PREMIUM_PRICE_ID }},\
              SMTP_HOST=smtp.gmail.com,\
              SMTP_PORT=587,\
              SMTP_USER=${{ secrets.SMTP_USER }},\
              SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }},\
              SMTP_FROM_EMAIL=${{ secrets.SMTP_USER }},\
              GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},\
              GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }},\
              GOOGLE_ANDROID_CLIENT_ID=${{ secrets.GOOGLE_ANDROID_CLIENT_ID }},\
              CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}"

      - name: Apply optional Ollama env vars to Cloud Run
        env:
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_LEARNING_PLAN_MODEL: ${{ secrets.OLLAMA_LEARNING_PLAN_MODEL }}
          OLLAMA_COPYRIGHT_CHECK_MODEL: ${{ secrets.OLLAMA_COPYRIGHT_CHECK_MODEL }}
          OLLAMA_VISION_MODEL: ${{ secrets.OLLAMA_VISION_MODEL }}
          OLLAMA_TEXT_GENERATION_MODEL: ${{ secrets.OLLAMA_TEXT_GENERATION_MODEL }}
        run: |
          set -e
          OLLAMA_VARS=""
          add_var() {
            key="$1"
            val="$2"
            [ -z "$val" ] && return 0
            if [ -n "$OLLAMA_VARS" ]; then
              OLLAMA_VARS="${OLLAMA_VARS},${key}=${val}"
            else
              OLLAMA_VARS="${key}=${val}"
            fi
          }
          add_var OLLAMA_BASE_URL "$OLLAMA_BASE_URL"
          add_var OLLAMA_LEARNING_PLAN_MODEL "$OLLAMA_LEARNING_PLAN_MODEL"
          add_var OLLAMA_COPYRIGHT_CHECK_MODEL "$OLLAMA_COPYRIGHT_CHECK_MODEL"
          add_var OLLAMA_VISION_MODEL "$OLLAMA_VISION_MODEL"
          add_var OLLAMA_TEXT_GENERATION_MODEL "$OLLAMA_TEXT_GENERATION_MODEL"
          if [ -z "$OLLAMA_VARS" ]; then
            echo "No OLLAMA_* secrets set; skipping Cloud Run env update."
            exit 0
          fi
          gcloud run services update quiz-marketplace-api \
            --region asia-northeast1 \
            --platform managed \
            --update-env-vars "$OLLAMA_VARS"

      - name: Apply optional cloud LLM env vars (Gemini / HF / Groq)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_VISION_MODEL: ${{ secrets.GEMINI_VISION_MODEL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_CHAT_BASE_URL: ${{ secrets.HF_CHAT_BASE_URL }}
          HF_CHAT_MODEL: ${{ secrets.HF_CHAT_MODEL }}
          HF_VISION_MODEL: ${{ secrets.HF_VISION_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_BASE_URL: ${{ secrets.GROQ_BASE_URL }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GROQ_VISION_MODEL: ${{ secrets.GROQ_VISION_MODEL }}
        run: |
          set -e
          LLM_VARS=""
          add_var() {
            key="$1"
            val="$2"
            [ -z "$val" ] && return 0
            if [ -n "$LLM_VARS" ]; then
              LLM_VARS="${LLM_VARS},${key}=${val}"
            else
              LLM_VARS="${key}=${val}"
            fi
          }
          add_var GEMINI_API_KEY "$GEMINI_API_KEY"
          add_var GEMINI_MODEL "$GEMINI_MODEL"
          add_var GEMINI_VISION_MODEL "$GEMINI_VISION_MODEL"
          add_var HF_TOKEN "$HF_TOKEN"
          add_var HF_CHAT_BASE_URL "$HF_CHAT_BASE_URL"
          add_var HF_CHAT_MODEL "$HF_CHAT_MODEL"
          add_var HF_VISION_MODEL "$HF_VISION_MODEL"
          add_var GROQ_API_KEY "$GROQ_API_KEY"
          add_var GROQ_BASE_URL "$GROQ_BASE_URL"
          add_var GROQ_MODEL "$GROQ_MODEL"
          add_var GROQ_VISION_MODEL "$GROQ_VISION_MODEL"
          if [ -z "$LLM_VARS" ]; then
            echo "No cloud LLM secrets set; skipping Cloud Run env update."
            exit 0
          fi
          gcloud run services update quiz-marketplace-api \
            --region asia-northeast1 \
            --platform managed \
            --update-env-vars "$LLM_VARS"
