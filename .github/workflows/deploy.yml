name: Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Copy docs/textbook into backend build context
        run: |
          mkdir -p backend/docs/textbook
          cp -r docs/textbook/* backend/docs/textbook/

      - name: Build and push Docker image
        run: |
          IMAGE="asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/quiz-marketplace/api:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/quiz-marketplace/api:${{ github.sha }}"
          gcloud run deploy quiz-marketplace-api \
            --image "$IMAGE" \
            --region asia-northeast1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "\
              ENABLE_ML=false,\
              DEBUG=false,\
              APP_NAME='AI Tangocho',\
              SUPABASE_URL=${{ secrets.SUPABASE_URL }},\
              SUPABASE_KEY=${{ secrets.SUPABASE_KEY }},\
              SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }},\
              DATABASE_URL=${{ secrets.DATABASE_URL }},\
              SECRET_KEY=${{ secrets.SECRET_KEY }},\
              STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }},\
              STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }},\
              STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }},\
              STRIPE_PREMIUM_PRICE_ID=${{ secrets.STRIPE_PREMIUM_PRICE_ID }},\
              SMTP_HOST=smtp.gmail.com,\
              SMTP_PORT=587,\
              SMTP_USER=${{ secrets.SMTP_USER }},\
              SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }},\
              SMTP_FROM_EMAIL=${{ secrets.SMTP_USER }},\
              GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},\
              GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }},\
              GOOGLE_ANDROID_CLIENT_ID=${{ secrets.GOOGLE_ANDROID_CLIENT_ID }},\
              CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}"
