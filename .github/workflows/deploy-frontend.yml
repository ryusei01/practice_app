name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    # gitHubToken で Cloudflare → GitHub Deployments を連携する場合に必須（無いと npx wrangler が exit 1 になりがち）
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ローカルの .env は Cloudflare に載らない。未設定だと本番で client_id が空になり Google 400 になる。
      - name: Verify EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID
        env:
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
        run: |
          if [ -z "$EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID" ]; then
            echo "::error::GitHub Actions のシークレット EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID が未設定または空です。リポジトリ Settings → Secrets and variables → Actions で、GCP の「ウェブアプリ」用 OAuth クライアント ID と同じ値を登録してから再デプロイしてください。"
            exit 1
          fi

      # ビルド時に EXPO_PUBLIC_API_URL が JS に埋め込まれる。未設定・古い Railway URLのままだと CORS / 接続エラーになる。
      - name: Verify EXPO_PUBLIC_API_URL
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "::error::EXPO_PUBLIC_API_URL が未設定です。バックエンドのベース URL（例: Cloud Run なら https://quiz-marketplace-api-xxxxx.asia-northeast1.run.app/api/v1）を GitHub の Actions シークレットに設定してください。"
            exit 1
          fi
          if echo "$EXPO_PUBLIC_API_URL" | grep -qi 'railway\.app'; then
            echo "::warning::EXPO_PUBLIC_API_URL が Railway を指しています。GCP（Cloud Run）運用なら、シークレットを ...run.app/api/v1 に更新し、フロントを再デプロイしてください。バックエンド側の CORS_ORIGINS に https://ai-practice-book.com が含まれることも確認してください。"
          fi

      # 特商法表記は EXPO_PUBLIC_TOKUSHO_* をビルド時に埋め込む。未設定だとプレースホルダーのままになる。
      - name: Build
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_ADMOB_ANDROID_APP_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_ANDROID_APP_ID }}
          EXPO_PUBLIC_ADMOB_IOS_APP_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_IOS_APP_ID }}
          EXPO_PUBLIC_AD_UNIT_ANDROID: ${{ secrets.EXPO_PUBLIC_AD_UNIT_ANDROID }}
          EXPO_PUBLIC_AD_UNIT_IOS: ${{ secrets.EXPO_PUBLIC_AD_UNIT_IOS }}
          EXPO_PUBLIC_AD_SLOT_WEB: ${{ secrets.EXPO_PUBLIC_AD_SLOT_WEB }}
          EXPO_PUBLIC_TOKUSHO_SELLER_NAME: ${{ secrets.EXPO_PUBLIC_TOKUSHO_SELLER_NAME }}
          EXPO_PUBLIC_TOKUSHO_OPERATOR_NAME: ${{ secrets.EXPO_PUBLIC_TOKUSHO_OPERATOR_NAME }}
          EXPO_PUBLIC_TOKUSHO_ADDRESS: ${{ secrets.EXPO_PUBLIC_TOKUSHO_ADDRESS }}
          EXPO_PUBLIC_TOKUSHO_PHONE: ${{ secrets.EXPO_PUBLIC_TOKUSHO_PHONE }}
          EXPO_PUBLIC_TOKUSHO_EMAIL: ${{ secrets.EXPO_PUBLIC_TOKUSHO_EMAIL }}
        run: npm run build:web

      - name: Verify build output (dist)
        working-directory: frontend
        run: |
          if [ ! -d dist ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "::error::frontend/dist が空または存在しません。Expo の web ビルドが失敗している可能性があります。"
            exit 1
          fi
          ls -la dist | head -20

      - name: Deploy to Cloudflare Pages
        id: pages-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=aipracticebook --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: frontend
